<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/msg/en.js"></script>
    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.2/dist/nipplejs.js"></script>
    <style>
        /* Basic Reset */
        body,
        html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            height: 100%;
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            position: relative;
        }


        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
            background-color: #eaeaea;
            position: relative;
        }

        .blockly-workspace {
            height: 80%;
            min-height: 85vh;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        .btn {
            margin-bottom: 0.1em;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
            background-color: grey;
        }

        .btn.btn-run {
            background-color: #007bff;
        }

        .btn:hover {
            background-color: darkgrey;
        }

        .btn-run:hover {
            background-color: #0056b3;
        }

        .btn-toggle-toolbox {
            padding: 6px 10px;
            font-size: 18px;
            z-index: 1001; /* Ensure it's above the Blockly workspace */
        }

        .main-nav .btn-nav {
            background-color: #6c757d;
            margin-right: 5px;
        }

        #assets-view {
            padding: 10px;
        }

        #asset-list {
            list-style: none;
            padding: 0;
        }

        #asset-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }

        .main-nav .btn-nav.active {
            background-color: #007bff;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dropdown-menu-container {
            position: relative;
            display: inline-block;
        }

        .btn-menu-toggle {
            background-color: #6c757d;
            color: white;
            padding: 8px 12px;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .dropdown-content button {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            background-color: #f9f9f9;
            border: none;
        }

        .dropdown-content button:hover {
            background-color: #f1f1f1;
        }

        .show {
            display: block;
        }

        .btn-icon {
            font-size: 18px; /* Adjust icon size */
            padding: 8px 12px; /* Adjust padding for a better look */
        }

        #joystick-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            z-index: 10;
        }

        #jump-button-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 15; /* Ensure it's above the joystick */
            display: none;
        }

        #touch-jump {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(90, 90, 90, 0.3);
            color: white;
            font-size: 28px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            font-weight: bold;
        }

        .interactive-ui {
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        .interactive-ui.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #blocklyDiv.toolbox-collapsed .blocklyToolboxDiv {
            display: none !important;
        }

        /* Show and arrange for Mobile */
        @media (max-width: 768px) {
            #jump-button-container {
                display: block;
            }
            .container {
                flex-direction: column;
            }
            .canvas-container {
                flex: none;
                height: 50%;
            }

            .controls {
                flex: none;
                height: 50%;
            }
        }
    </style>
</head>

<body>
    {{ content }}
    <div id="workspace-data" style="display: none;">{{ page.workspace_data }}</div>
    <div class="container">
        <div class="canvas-container">
            <div id="joystick-zone"></div>
            <canvas id="gameCanvas"></canvas>
            <div id="jump-button-container" class="interactive-ui">
                <button id="touch-jump">⇧</button>
            </div>
        </div>
        <div class="controls">
            <div class="top-bar">
                <div class="main-nav">
                    <button id="codeViewButton" class="btn btn-nav btn-icon active" title="Code">👩‍💻</button>
                    <button id="assetsViewButton" class="btn btn-nav btn-icon" title="Assets">📦</button>
                </div>
                <div class="action-buttons">
                    <button id="runButton" class="btn btn-run btn-icon" title="Run">▶</button>
                    <div class="dropdown-menu-container">
                        <button id="menuButton" class="btn btn-icon btn-menu-toggle" title="More actions">⋮</button>
                        <div id="dropdownMenu" class="dropdown-content">
                            <button id="saveButton" class="btn btn-icon" title="Save">💾 Save</button>
                            <button id="publishButton" class="btn btn-icon" title="Publish">🚀 Publish</button>
                            <button id="loadButton" class="btn btn-icon" title="Load">📂 Load</button>
                            <button id="shareButton" class="btn btn-icon" title="Share">🔗 Share</button>
                            <button id="fullscreenBtn" class="btn btn-icon" title="Fullscreen">⛶ Fullscreen</button>
                            <button id="docsButton" class="btn btn-icon" title="Documentation">❓ Docs</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="code-view">
                
                <div class="editor-toggle-buttons" style="margin-bottom: 10px;">
                    <button id="toggleToolboxButton" class="btn btn-toggle-toolbox">☰</button>
                    <button id="showBlocksButton" class="btn" style="background-color: #6c757d;">Show Blocks</button>
                    <button id="showJsButton" class="btn" style="background-color: #6c757d;">Show JavaScript</button>                                        
                </div>
                <div id="blocklyDiv" class="blockly-workspace digital-education-safety-theme"></div>
                <div id="monacoEditorContainer" class="editor-container"
                    style="height: 80%; min-height: 300px; border: 1px solid #ddd; margin-bottom: 10px; display: none;">
                    <!-- Monaco Editor will be initialized here by script.js -->
                </div>
            </div>
            <div id="assets-view" style="display: none;">
                <h2>Asset Manager</h2>
                <input type="file" id="asset-uploader" multiple>
                <ul id="asset-list">
                    <!-- Assets will be listed here -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Monaco Editor CDN -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min/vs/loader.js"></script>
    <script src="/script.js" defer></script>
</body>
</html>
