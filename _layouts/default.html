<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
    <script src="https://cdn.digitaleducationsafety.org/packages/babylon.js@8.36.1/babylon.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/babylon.js@8.36.1/babylon.gui.min.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/babylon.js@8.36.1/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/blockly@11.1.1/blockly_compressed.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/blockly@11.1.1/blocks_compressed.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/blockly@11.1.1/javascript_compressed.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/blockly@11.1.1/en.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/cannon@0.6.2/cannon.min.js"></script>
    <script src="https://cdn.digitaleducationsafety.org/packages/nipplejs@0.10.2/nipplejs.js"></script>
    <style>
        /* Basic Reset */
        body,
        html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            height: 100%;
        }

        body {
            padding-bottom: 40px; /* Space for the bottom nav */
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            position: relative;
        }


        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background-color: #eaeaea;
            position: relative;
        }

        .blockly-workspace {
            height: 100%;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
        }

        #code-view, #assets-view {
            height: 100%;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        .btn {
            /* margin-bottom: 0.1em; */
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
        }

        .btn.btn-run {
            background-color: #007bff;
        }

        .btn:hover {
            background-color: darkgrey;
        }

        .btn-run:hover {
            background-color: #0056b3;
        }

        .btn-toggle-toolbox {
            padding: 6px 10px;
            font-size: 18px;
            z-index: 1001; /* Ensure it's above the Blockly workspace */
        }

        .main-nav .btn-nav {
            background-color: #6c757d;
            margin-right: 5px;
        }

        #assets-view {
            padding: 10px;
        }

        #asset-list {
            list-style: none;
            padding: 0;
        }

        #asset-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }

        .main-nav .btn-nav.active {
            background-color: #007bff;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .action-buttons {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dropdown-menu-container {
            position: relative;
            display: inline-block;
        }

        .btn-menu-toggle {
            background-color: #6c757d;
            color: white;
            padding: 8px 12px;
            font-size: 18px;
            border: none;
            cursor: pointer;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            bottom: 100%; /* Position above the button */
            margin-bottom: 5px; /* Add some space */
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .dropdown-content button {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            background-color: #f9f9f9;
            border: none;
        }

        .dropdown-content button:hover {
            background-color: #f1f1f1;
        }

        .show {
            display: block;
        }

        .btn-icon {
            font-size: 18px; /* Adjust icon size */
            padding: 8px 12px; /* Adjust padding for a better look */
        }

        #joystick-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            z-index: 10;
        }

        #jump-button-container {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 15; /* Ensure it's above the joystick */
            display: none;
        }

        #touch-jump {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(90, 90, 90, 0.3);
            color: white;
            font-size: 28px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            font-weight: bold;
        }

        .interactive-ui {
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        .interactive-ui.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #blocklyDiv.toolbox-collapsed .blocklyToolboxDiv {
            display: none !important;
        }

        #bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px; /* Increased height for better touch targets */
            background-color: #333;
            z-index: 1002;
            /* padding: 0 10px; */
        }

        .nav-section-left, .nav-section-right {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-tab {
            background-color: #555;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 10px 15px;
            border-top: 3px solid transparent;
        }

        .nav-tab.active {
            background-color: #007bff;
            border-top: 3px solid #fff;
        }

        .editor-toggle-buttons .btn-icon {
            background-color: #6c757d;
        }

        .editor-toggle-buttons .btn-icon.active {
            background-color: #007bff;
        }

        .container {
            height: 100%;
            width: 100%;
        }
        .canvas-container {
            display: none;
            width: 100%;
            height: 100%;
        }
        .controls {
            display: flex; /* Keep as flex for internal layout */
            width: 100%;
            height: 100%;
        }

        .container.preview-active .canvas-container {
            display: flex;
        }

        .container.preview-active .controls {
            display: none;
        }
        /* Show and arrange for Mobile */
        @media (max-width: 768px) {
            #jump-button-container {
                display: block;
            }
        }

        /* Hero Overlay Styles */
        #hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
            text-align: center;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }

        #hero-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .hero-content {
            max-width: 600px;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        #start-button {
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #007bff;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        #start-button:hover {
            background-color: #0056b3;
        }

        /* Presentation Mode and Fullscreen Styles */
        body.presentation-mode .controls,
        body.fullscreen-active .controls {
            display: none;
        }
        body.presentation-mode .container,
        body.fullscreen-active .container {
            display: block;
        }
        body.presentation-mode .canvas-container,
        body.fullscreen-active .canvas-container {
            width: 100vw;
            height: 100vh;
        }
        body.fullscreen-active #bottom-nav {
            display: none;
        }
    </style>
</head>

<body>
    <div id="hero-overlay">
        <div class="hero-content">
            <h1>Welcome to the Creative Coding Environment</h1>
            <p>Your journey into interactive 3D development starts here. Click the button below to begin.</p>
            <button id="start-button" class="btn">Start Coding</button>
        </div>
    </div>
    {{ content }}
    <div id="workspace-data" style="display: none;">{{ page.workspace_data }}</div>
    <div class="container">
        <div class="canvas-container">
            <div id="joystick-zone"></div>
            <canvas id="gameCanvas"></canvas>
            <div id="jump-button-container" class="interactive-ui">
                <button id="touch-jump">⇧</button>
            </div>
        </div>
        <div class="controls">
            <div id="code-view">
                <div id="blocklyDiv" class="blockly-workspace digital-education-safety-theme toolbox-collapsed"></div>
                <div id="monacoEditorContainer" class="editor-container"
                    style="height: 80%; min-height: 300px; border: 1px solid #ddd; margin-bottom: 10px; display: none;">
                    <!-- Monaco Editor will be initialized here by script.js -->
                </div>
            </div>
            <div id="assets-view" style="display: none;">
                <h2>Asset Manager</h2>
                <input type="text" id="asset-url-input" placeholder="Enter asset URL" style="width: calc(100% - 120px); margin-right: 8px; padding: 5px;">
                <button id="add-asset-from-url-button" class="btn">Import</button>
                <br><br>
                <input type="file" id="asset-uploader" multiple>
                <ul id="asset-list">
                    <!-- Assets will be listed here -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Monaco Editor CDN -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min/vs/loader.js"></script>
    <div id="bottom-nav">
        <div class="nav-section-left">
            <button id="workspace-tab" class="nav-tab active">Workspace</button>
            <button id="preview-tab" class="nav-tab">Preview</button>
        </div>
        <div class="nav-section-right">
            <button id="runButton" class="btn btn-run btn-icon" title="Run">▶</button>
            <div class="dropdown-menu-container">
                <button id="menuButton" class="btn btn-icon btn-menu-toggle" title="More actions">⋮</button>
                <div id="dropdownMenu" class="dropdown-content">
                    <button id="toggleToolboxButton" class="btn btn-toggle-toolbox" title="Toggle Toolbox">☰ Hide Toolbox</button>
                    <button id="codeViewButton" class="btn btn-icon active" title="Code">👩‍💻 Code</button>
                    <button id="assetsViewButton" class="btn btn-icon" title="Assets">📦Assets </button>
                    <button id="showBlocksButton" class="btn" title="Show Blocks">Blocks</button>
                    <button id="showJsButton" class="btn" title="Show JavaScript">JavaScript</button>
                    <button id="saveButton" class="btn btn-icon" title="Save">💾 Save</button>
                    <button id="publishButton" class="btn btn-icon" title="Publish">🚀 Publish</button>
                    <button id="loadButton" class="btn btn-icon" title="Load">📂 Load</button>
                    <button id="shareButton" class="btn btn-icon" title="Share">🔗 Share</button>
                    <button id="fullscreenBtn" class="btn btn-icon" title="Fullscreen">⛶ Fullscreen</button>
                    <button id="docsButton" class="btn btn-icon" title="Documentation">❓ Docs</button>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ site.baseurl }}/script.js" defer></script>
</body>
</html>
