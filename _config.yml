baseurl: "/engine"

collections:
  workspaces:
    output: true
    permalink: /:collection/:name/
    defaults:
      -
        scope:
          path: ""
        values:
          layout: "default"

  docs:
    output: true
    permalink: /:collection/:name/
    defaults:
      -
        scope:
          path: ""
        values:
          layout: "docs"

include:
  - "script.js"
  - "favicon.ico"

exclude:
  - tests
  - vendor/
  - verification/
