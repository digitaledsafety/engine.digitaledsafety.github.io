<html>
<head>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/msg/en.js"></script>
    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>
    <style>
        /* Basic Reset */
        body,
        html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            height: 100%;
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
            background-color: #eaeaea;
        }

        .blockly-workspace {
            height: 80%;
            min-height: 300px;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        .btn {
            margin-bottom: 0.1em;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
            background-color: grey;
        }

        .btn.btn-run {
            background-color: #007bff;
        }

        .btn:hover {
            background-color: darkgrey;
        }

        .btn-run:hover {
            background-color: #0056b3;
        }

        /* Responsive for Mobile */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .canvas-container {
                flex: none;
                height: 50%;
            }

            .controls {
                flex: none;
                height: 50%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>
        <div class="controls">
            <div id="blocklyDiv" class="blockly-workspace"></div>
            <button id="runButton" class="btn btn-run">Run</button>
            <button id="saveButton" class="btn">Save</button>
            <button id="loadButton" class="btn">Load</button>

            <hr style="margin: 20px 0;">

            <div id="objectScriptingSection">
                <h3>Object Scripting</h3>
                <div>
                    <label for="scriptingObjectSelector">Select Object:</label>
                    <select id="scriptingObjectSelector" class="btn" style="width: 100%; margin-bottom: 10px;"></select>
                </div>
                <div>
                    <p>Current Script Type: <span id="currentScriptTypeIndicator">None</span></p>
                </div>
                <div>
                    <label for="rawJsTextarea">JavaScript Code (for selected object):</label>
                    <textarea id="rawJsTextarea" style="width: 100%; height: 150px; margin-bottom: 10px; font-family: monospace;"></textarea>
                </div>
                <button id="saveJsScriptButton" class="btn">Save JavaScript to Object</button>
                <button id="clearObjectScriptButton" class="btn">Clear Object's Script</button>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
