<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly@11.1.1/msg/en.js"></script>
    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>
    <style>
        /* Basic Reset */
        body,
        html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            height: 100%;
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100%;
            width: 100%;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
            background-color: #eaeaea;
        }

        .blockly-workspace {
            height: 80%;
            min-height: 300px;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
        }

        .btn {
            margin-bottom: 0.1em;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            color: white;
            background-color: grey;
        }

        .btn.btn-run {
            background-color: #007bff;
        }

        .btn:hover {
            background-color: darkgrey;
        }

        .btn-run:hover {
            background-color: #0056b3;
        }

        #touch-controls {
            display: none; /* Hidden by default on desktop */
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            justify-content: space-between;
            padding: 0 5%;
            box-sizing: border-box;
            z-index: 10;
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10+ */
            user-select: none; /* Standard syntax */
        }

        #touch-controls .touch-cluster {
            display: flex;
            gap: 20px;
        }

        #touch-controls button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: rgba(90, 90, 90, 0.6);
            color: white;
            font-size: 28px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }

        /* Show and arrange for Mobile */
        @media (max-width: 768px) {
            #touch-controls {
                display: flex;
            }
            .container {
                flex-direction: column;
            }

            .canvas-container {
                flex: none;
                height: 50%;
            }

            .controls {
                flex: none;
                height: 50%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div id="touch-controls">
                <div id="touch-move" class="touch-cluster">
                    <button id="touch-left">⇦</button>
                    <button id="touch-right">⇨</button>
                </div>
                <div id="touch-action" class="touch-cluster">
                    <button id="touch-jump">⇧</button>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="editor-toggle-buttons" style="margin-bottom: 10px;">
                <button id="showBlocksButton" class="btn" style="background-color: #6c757d;">Show Blocks</button>
                <button id="showJsButton" class="btn" style="background-color: #6c757d;">Show JavaScript</button>
            </div>
            <div id="blocklyDiv" class="blockly-workspace"></div>
            <div id="monacoEditorContainer" class="editor-container" style="height: 80%; min-height: 300px; border: 1px solid #ddd; margin-bottom: 10px; display: none;">
                <!-- Monaco Editor will be initialized here by script.js -->
            </div>
            <button id="runButton" class="btn btn-run">Run</button>
            <button id="saveButton" class="btn">Save</button> <!-- Consider if save/load needs to be context-aware for JS view -->
            <button id="loadButton" class="btn">Load</button> <!-- Consider if save/load needs to be context-aware for JS view -->
        </div>
    </div>

    <!-- Monaco Editor CDN -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min/vs/loader.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
